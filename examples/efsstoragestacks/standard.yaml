apiVersion: aws.hops.ops.com.ai/v1alpha1
kind: EFSStorageStack
metadata:
  name: gitkb
  namespace: default
spec:
  region: us-east-2
  labels:
    app.kubernetes.io/part-of: gitkb
  tags:
    workload: gitkb
  providerConfigRefs:
    kubernetes:
      name: platform
      kind: ProviderConfig
  cluster:
    name: platform
    addon:
      installEfsCsiDriver: true
    podIdentity:
      enabled: true
  network:
    vpcId: vpc-0123456789abcdef0
    subnetIds:
      - subnet-0123456789abcdef0
      - subnet-0fedcba9876543210
    clientSecurityGroupIds:
      - sg-0123456789abcdef0
  fileSystem:
    encrypted: true
    throughputMode: elastic
    backupPolicy:
      enabled: true
  accessPoints:
    - name: gitkb
      path: /gitkb
      posixUser:
        uid: 1000
        gid: 1000
      creationInfo:
        ownerUid: 1000
        ownerGid: 1000
        permissions: "0750"
  storageClasses:
    - name: efs-gitkb
      reclaimPolicy: Retain
      parameters:
        basePath: /gitkb
        directoryPerms: "750"
